<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Advanced Filter Playground</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f7f9fc;
      margin: 0;
      padding: 20px;
    }
    h1 {
      text-align: center;
      color: #4a6fa5;
    }
    .container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      margin-top: 20px;
    }
    .preview {
      flex: 1 1 400px;
      text-align: center;
    }
    .preview img, .preview video {
      max-width: 100%;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      transition: filter 0.2s ease;
    }
    .controls {
      flex: 1 1 300px;
      background: #fff;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.08);
    }
    .controls label {
      display: block;
      margin-top: 15px;
      font-weight: bold;
      color: #4a6fa5;
    }
    .controls input[type="range"] {
      width: 100%;
    }
  </style>
</head>
<body>
  <h1>Advanced Image & Video Filters</h1>

  <div class="container">
    <!-- Preview Area -->
    <div class="preview">
      <img id="image" src="https://picsum.photos/500/300" alt="Sample Image">
      <video id="video" src="https://www.w3schools.com/html/mov_bbb.mp4" controls></video>
    </div>

    <!-- Controls -->
    <div class="controls">
      <label>Brightness</label>
      <input type="range" id="brightness" min="50" max="200" value="100">

      <label>Contrast</label>
      <input type="range" id="contrast" min="50" max="200" value="100">

      <label>Saturation</label>
      <input type="range" id="saturate" min="0" max="200" value="100">

      <label>Grayscale</label>
      <input type="range" id="grayscale" min="0" max="100" value="0">

      <label>Sepia</label>
      <input type="range" id="sepia" min="0" max="100" value="0">

      <label>Hue Rotate</label>
      <input type="range" id="hue" min="0" max="360" value="0">

      <label>Blur</label>
      <input type="range" id="blur" min="0" max="10" value="0">
    </div>
  </div>

  <script>
    const image = document.getElementById("image");
    const video = document.getElementById("video");
    const sliders = document.querySelectorAll(".controls input");

    function applyFilters() {
      const brightness = document.getElementById("brightness").value;
      const contrast = document.getElementById("contrast").value;
      const saturate = document.getElementById("saturate").value;
      const grayscale = document.getElementById("grayscale").value;
      const sepia = document.getElementById("sepia").value;
      const hue = document.getElementById("hue").value;
      const blur = document.getElementById("blur").value;

      const filterString = `
        brightness(${brightness}%)
        contrast(${contrast}%)
        saturate(${saturate}%)
        grayscale(${grayscale}%)
        sepia(${sepia}%)
        hue-rotate(${hue}deg)
        blur(${blur}px)
      `;

      image.style.filter = filterString;
      video.style.filter = filterString;
    }

    sliders.forEach(slider => {
      slider.addEventListener("input", applyFilters);
    });

    applyFilters(); // initialize
  </script>
</body>
</html>
